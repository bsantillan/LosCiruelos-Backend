name: CI - Backend Padel Club

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: padel_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build, tests y coverage
        env:
          DB_URL: jdbc:postgresql://localhost:5432/padel_test
          DB_USER: test_user
          DB_PASSWORD: test_password
          JWT_SECRET: test_secret_key_que_debe_tener_al_menos_32_caracteres
          EMAIL_FROM: test@test.com
          MAIL_USERNAME: test@test.com
          MAIL_PASSWORD: test_password
          GOOGLE_CLIENT_ID: test_client_id
        run: mvn clean verify

      - name: Publicar reporte de coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/site/jacoco/

      - name: Publicar reporte de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

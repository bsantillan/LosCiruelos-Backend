services:
  postgres:
    image: postgres:16
    container_name: padel_club_db
    environment:
      POSTGRES_DB: padel_club
      POSTGRES_USER: padel_user
      POSTGRES_PASSWORD: padel_pass
    ports:
      - "5432:5432"
    volumes:
      - padel_data:/var/lib/postgresql/data  # los datos persisten aunque pares el contenedor

volumes:
  padel_data:
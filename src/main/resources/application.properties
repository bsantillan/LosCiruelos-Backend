spring.application.name=padel-club-api

# Base de datos
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Admin
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

# Hibernate
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# FlyWay
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/Migrations
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Security
jwt.secret=${JWT_SECRET}
jwt.expiration=900
refresh_token.expiration=604800

# Cambiá solo esta línea para cambiar de proveedor
email.provider=gmail
email.from=${EMAIL_FROM}

payment.provider=mercadopago

# Google
google.client-id=${GOOGLE_CLIENT_ID}

# Config Email
spring.mail.host=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Mercado Pago
mercadopago.access-token=${MP_ACCESS_TOKEN}
mercadopago.webhook-url=${MP_WEBHOOK_URL}
app.frontend-url=${MP_FRONTEND_URL}

